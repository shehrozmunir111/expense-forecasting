services:
  # -- API (SQLite, zero-dependency MVP) ---------------------------- #
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persists SQLite DB + trained model + Chroma index
    env_file:
      - path: .env
        required: false
    environment:
      # Inside the container "localhost" is the container; reach the host's
      # LM Studio via host.docker.internal (overrides the .env localhost URLs).
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      EMBEDDING_BASE_URL: http://host.docker.internal:1234/v1
      LANGSMITH_TRACING: "false"   # keep the container self-contained
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # -- Optional: PostgreSQL for production (run with --profile pg) -- #
  db:
    image: postgres:16-alpine
    profiles: ["pg"]
    environment:
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
      POSTGRES_DB: expense_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense"]
      interval: 10s
      timeout: 5s
      retries: 5

  api_pg:
    build: .
    profiles: ["pg"]
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://expense:expense@db:5432/expense_db
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      EMBEDDING_BASE_URL: http://host.docker.internal:1234/v1
      LANGSMITH_TRACING: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
